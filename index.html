<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Payday</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  color: #111;
  overflow-x: hidden;
}
header {
  background:#1d2228;
  color:white;
  padding:10px 24px;
  font-size:22px;
  font-weight:bold;
  border-bottom:4px solid #16A34A;
  display:flex;
  align-items:center;
  gap:12px;
}
header img {
  height:32px;
  width:auto;
  display:block;
}
.container {
  width:90vw;
  max-width:1600px;
  margin:30px auto;
  background:white;
  padding:28px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
h2 {
  margin-top:0;
  font-size:20px;
  font-weight:bold;
  color:#333;
}
input, textarea {
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:6px;
  font-family:Consolas, monospace;
  font-size:14px;
  box-sizing:border-box;
}
#aiOutput {
  height:500px;
  resize:vertical;
}
button {
  margin-top:12px;
  margin-bottom:12px;
  padding:12px 12px;
  background:#16A34A;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}
</style>
</head>

<body>
<header>
  <img src="payday-logo.svg">
  Version v1.5
</header>

<div class="container">
  <h2>Suggest a ticker (optional)</h2>
  <input id="suggestBox" placeholder="Example: AMD" />

  <button id="runBtn">Run Payday</button>

  <h2>Payday Analyst Output</h2>
  <textarea id="aiOutput" readonly></textarea>
</div>

<script>
const GROQ_KEY = "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";

const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/1EKabJN1aa_60cvTNJbcA3TElIayT3OjrH7lx793fFew/gviz/tq?tqx=out:json";

function fmt(n, d = 2) {
  if (n === null || n === undefined || isNaN(n)) return "-";
  return Number(n).toFixed(d);
}

async function readSheetCache() {
  const r = await fetch(SHEET_URL);
  const text = await r.text();
  const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
  const table = json.table;
  const rows = table.rows.slice(1).map(r => r.c.map(c => (c ? c.v : null)));
  return rows;
}

async function buildFeed() {
  const rows = await readSheetCache();
  return rows
    .map(r => `${r[0]} price:${fmt(r[1])} change:${fmt(r[2])} pct:${fmt(r[3])} high:${fmt(r[4])} low:${fmt(r[5])} prevClose:${fmt(r[6])}`)
    .join("\n");
}

async function runAnalyst() {
  const out = document.getElementById("aiOutput");
  const suggest = document.getElementById("suggestBox").value.trim();

  out.value = "Loading market data...";

  const feed = await buildFeed();

  const finalPrompt = `
PAYDAY ANALYST INPUT

Market Feed:
${feed}

Ticker Constraint:
${suggest || "None"}

CONTEXT:
The feed represents a broad large-cap universe (S&P 100 + additional tickers). Treat it as a single ranked market, not thematic subsets.

RULES:

Use ONLY tickers and data explicitly present in the feed.
Do NOT add any new tickers or assume missing ones.
Do NOT infer sectors, macro themes, or news.
All conclusions must be based strictly on relative performance ranking within the full feed.
Leaders and laggards are defined by position in the full distribution, not by narrative grouping.
Ignore absolute moves unless they materially separate from the rest of the feed.
Focus on extremes (top and bottom of the distribution only).

If ticker missing or not in feed:
"Provided ticker is unknown."

TASK:
Produce a hedge fund momentum desk note based on full-universe ranking.

OUTPUT:

Tape Structure
Describe the overall distribution (broad risk-on, dispersion, or concentration).
Must reference only relative spread between top and bottom performers.
Relative Strength Leaders
Top 3–5 names in the entire feed ranked in order.
Explain only relative outperformance vs rest of universe.
Breakdown Names
Bottom 3–5 names ranked in order.
Emphasize severity of underperformance vs peers.
Dislocations
Largest gaps between top and bottom of the full feed.
Focus only on ranking divergence.
Ticker Review (only if provided)
Classify EXACTLY ONE:
leader / breakout / laggard / overextended / avoid
Must be justified strictly by full-universe rank.

STYLE:

Institutional trading desk tone.
No narrative framing or sector storytelling.
No external assumptions (news, flows, sentiment).
No tables.
Under 200 words.
`;

  out.value = "Thinking...";

  try {
    const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + GROQ_KEY
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          { role: "system", content: "You are Payday, a sharp, opinionated equity market analyst. Be direct, structured, and actionable." },
          { role: "user", content: finalPrompt }
        ]
      })
    });

    const j = await r.json();
    const text = j?.choices?.[0]?.message?.content;
    out.value = text || "Groq returned no content.";
  } catch (e) {
    out.value = "Groq request failed: " + e.message;
  }
}

document.getElementById("runBtn").onclick = runAnalyst;
</script>

</body>
</html>
