<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Payday</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body { margin:0; font-family:Arial, sans-serif; background:#f5f5f5; color:#111; }
  header { background:#1d2228; color:white; padding:16px 24px; font-size:22px; font-weight:bold; border-bottom:2px solid #0f8bff; }
  .container { max-width:900px; margin:24px auto; background:white; padding:22px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.15); }
  h2 { margin-top:0; font-size:18px; font-weight:bold; color:#333; }
  input, textarea { width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-family:Consolas, monospace; font-size:13px; box-sizing:border-box; }
  textarea { resize:vertical; }
  #aiOutput { height:260px; }
  button { margin-top:10px; padding:10px 16px; background:#0f8bff; border:none; border-radius:6px; color:white; font-weight:bold; cursor:pointer; font-size:14px; }
</style>
</head>

<body>
<header>Payday v1.1</header>

<div class="container">
  <h2>Suggest a ticker (optional)</h2>
  <input id="suggestBox" placeholder="Example: NVDA" />

  <button id="runBtn">Run Analyst</button>

  <h2>Payday Analyst Output</h2>
  <textarea id="aiOutput" readonly></textarea>
</div>

<script>
const GROQ_KEY = "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";

const SYMBOLS = [
  "AAPL","MSFT","GOOGL","AMZN","NVDA","META","TSLA","JPM","V","HD",
  "UNH","XOM","LLY","AVGO","COST","PEP","KO","ABBV","ADBE","CRM",
  "CSCO","ACN","TXN","CMCSA","NKE","MRK","MCD","AMD","INTC","AMGN",
  "IBM","ORCL","QCOM","UPS","CVX","WMT","PG","BRK.B","NFLX","PYPL"
];

function fmt(n, d = 2) {
  if (n === null || n === undefined || isNaN(n)) return "-";
  return Number(n).toFixed(d);
}

async function fetchQuote(sym) {
  const url = `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=d87mv7pr01qmhakghddgd87mv7pr01qmhakghde0`;
  const r = await fetch(url);
  if (!r.ok) throw new Error("Finnhub HTTP " + r.status);
  const j = await r.json();
  if (!j || typeof j.c !== "number") throw new Error("Bad Finnhub payload");
  return {
    symbol: sym,
    price: j.c,
    change: j.d,
    percent: j.dp,
    high: j.h,
    low: j.l,
    prevClose: j.pc,
    ts: j.t
  };
}

async function buildFeed() {
  let feed = "";
  for (const sym of SYMBOLS) {
    try {
      const q = await fetchQuote(sym);
      feed += `${q.symbol} price:${fmt(q.price)} change:${fmt(q.change)} pct:${fmt(q.percent)} high:${fmt(q.high)} low:${fmt(q.low)} prevClose:${fmt(q.prevClose)}\n`;
    } catch (e) {
      // skip symbol on error
    }
  }
  return feed;
}

async function runAnalyst() {
  const out = document.getElementById("aiOutput");
  const suggest = document.getElementById("suggestBox").value.trim();

  out.value = "Loading market data from Finnhub...";

  const feed = await buildFeed();

  const finalPrompt = `
PAYDAY ANALYST INPUT
--------------------
Market Feed (Finnhub /quote):
${feed}

User Suggestion:
${suggest || "None"}

TASK:
Act as a professional equity market analyst.
Using only the feed above, do ALL of the following:
- Identify strongest momentum names (price + % change).
- Identify biggest losers.
- Call out any names with outsized moves vs peers.
- Note any interesting patterns (mega-cap vs others, sectors if obvious from tickers).
- If a suggestion is provided, analyze that ticker in detail: trend, risk, and how it compares to the rest of the list.
Return a concise but information-dense written analysis, not a table.
`;

  out.value = "Sending to Groq...";

  try {
    const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + GROQ_KEY
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          { role: "system", content: "You are Payday, a sharp, opinionated equity market analyst. Be direct, structured, and actionable." },
          { role: "user", content: finalPrompt }
        ]
      })
    });

    const j = await r.json();
    const text = j?.choices?.[0]?.message?.content;
    out.value = text || "Groq returned no content.";
  } catch (e) {
    out.value = "Groq request failed: " + e.message;
  }
}

document.getElementById("runBtn").onclick = runAnalyst;
</script>

</body>
</html>
