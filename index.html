<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Payday</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  color: #111;
  overflow-x: hidden;
}
header {
  background:#1d2228;
  color:white;
  padding:10px 24px;
  font-size:22px;
  font-weight:bold;
  border-bottom:4px solid #16A34A;
  display:flex;
  align-items:center;
  gap:12px;
}
header img {
  height:32px;
  width:auto;
  display:block;
}
.container {
  width:90vw;
  max-width:1600px;
  margin:30px auto;
  background:white;
  padding:28px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
h2 {
  margin-top:0;
  font-size:20px;
  font-weight:bold;
  color:#333;
}
input, textarea {
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:6px;
  font-family:Consolas, monospace;
  font-size:14px;
  box-sizing:border-box;
}
#aiOutput {
  height:500px;
  resize:vertical;
}
button {
  margin-top:12px;
  margin-bottom:12px;
  padding:12px 12px;
  background:#16A34A;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

#disclaimer {
  margin-top: 8px;
  font-size: 12px;
  color: #666;
  text-align: right;
  padding-right: 4px;
  border-top: 1px solid #e5e5e5;
  padding-top: 6px;
  font-style: italic;
}
</style>
</head>

<body>
<header>
  <img src="payday-logo.svg">
  Version v2.0
</header>

<div class="container">
  <h2>Suggest a ticker (optional)</h2>
  <input id="suggestBox" placeholder="Example: AMD" />

  <button id="runBtn">Run Payday</button>

  <h2>Payday AI Analyst Output</h2>
  <textarea id="aiOutput" readonly></textarea>

  <div id="disclaimer">
    All data is provided for informational purposes only, and is not intended for trading purposes or financial, investment, tax, legal, accounting or other advice. The data used for Payday is the S&P 100.
  </div>
</div>

<script>
const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/1EKabJN1aa_60cvTNJbcA3TElIayT3OjrH7lx793fFew/gviz/tq?tqx=out:json";

function fmt(n, d = 2) {
  if (n === null || n === undefined || isNaN(n)) return "-";
  return Number(n).toFixed(d);
}

async function readSheetCache() {
  const r = await fetch(SHEET_URL);
  const text = await r.text();
  const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
  const table = json.table;
  const rows = table.rows.slice(1).map(r => r.c.map(c => (c ? c.v : null)));
  return rows;
}

async function buildFeed() {
  const rows = await readSheetCache();
  return rows
    .map(r => `${r[0]} price:${fmt(r[1])} change:${fmt(r[2])} pct:${fmt(r[3])} high:${fmt(r[4])} low:${fmt(r[5])} prevClose:${fmt(r[6])}`)
    .join("\n");
}

async function runAnalyst() {
  const out = document.getElementById("aiOutput");
  const suggest = document.getElementById("suggestBox").value.trim();

  out.value = "Loading market data...";

  const feed = await buildFeed();

  out.value = "Thinking...";

  try {
    const r = await fetch("/api", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        feed,
        suggest
      })
    });

    const j = await r.json();
    const text = j?.choices?.[0]?.message?.content;
    out.value = text || "Worker returned no content.";
  } catch (e) {
    out.value = "Worker request failed: " + e.message;
  }
}

document.getElementById("runBtn").onclick = runAnalyst;
</script>

</body>
</html>
