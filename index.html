<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Payday</title>
<style>
  body { margin:0; font-family:Arial; background:#f5f5f5; }
  header { background:#1d2228; color:white; padding:16px; font-size:22px; font-weight:bold; }
  .container { max-width:900px; margin:20px auto; background:white; padding:20px; border-radius:8px; }
  textarea, input { width:100%; padding:10px; margin-top:10px; border:1px solid #ccc; border-radius:6px; font-family:Consolas; }
  #aiOutput { height:260px; }
  button { margin-top:10px; padding:10px 16px; background:#0f8bff; border:none; border-radius:6px; color:white; font-weight:bold; cursor:pointer; }
</style>
</head>

<body>
<header>Payday</header>

<div class="container">

  <h2>Suggest a ticker (optional)</h2>
  <input id="suggestBox" placeholder="Example: NVDA" />

  <button id="runBtn">Run Analyst</button>

  <h2>Payday Analyst</h2>
  <textarea id="aiOutput" readonly></textarea>

</div>

<script>
const FMP_KEY = "9JdfXFF1la9PBjBSJMWR7MfPDXwLfHTS";
const GROQ_KEY = "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"; 
// S&P100
const SYMBOLS = [
  "AAPL","MSFT","GOOGL","AMZN","NVDA","META","TSLA","BRK.B","JPM","V",
  "JNJ","WMT","PG","MA","HD","XOM","COST","AVGO","LLY","UNH",
  "PEP","KO","ABBV","ADBE","CRM","CSCO","ACN","TXN","CMCSA","NKE",
  "MRK","MCD","AMD","INTC","AMGN","IBM","ORCL","QCOM","UPS","CVX"
];

function fmt(n){ return isNaN(n)?"-":Number(n).toFixed(2); }

async function fetchQuote(sym){
  const url = `https://financialmodelingprep.com/stable/historical-price-eod/full?symbol=${sym}&apikey=${FMP_KEY}`;
  const r = await fetch(url);
  const j = await r.json();
  return j[0];
}

async function buildFeed(){
  let feed = "";
  for(const sym of SYMBOLS){
    try{
      const q = await fetchQuote(sym);
      if(!q) continue;
      feed += `${sym} price:${fmt(q.price)} change:${fmt(q.change)} pct:${fmt(q.changesPercentage)} vol:${q.volume}\n`;
    }catch(e){}
  }
  return feed;
}

async function runAnalyst(){
  const out = document.getElementById("aiOutput");
  const suggest = document.getElementById("suggestBox").value.trim();

  out.value = "Loading market data...";

  const feed = await buildFeed();

  const finalPrompt = `
PAYDAY ANALYST INPUT
--------------------
Market Feed:
${feed}

User Suggestion:
${suggest || "None"}

TASK:
Analyze the market feed like a professional financial analyst.
Identify:
- strongest momentum
- biggest losers
- unusual volume
- sector trends
- anything notable
- if suggestion is provided, analyze that ticker deeply
`;

  out.value = "Sending to Groq...";

  const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + GROQ_KEY
    },
    body:JSON.stringify({
      model:"llama-3.1-70b-versatile",
      messages:[
        {role:"system", content:"You are Payday, a financial analyst."},
        {role:"user", content:finalPrompt}
      ]
    })
  });

  const j = await r.json();
  out.value = j.choices?.[0]?.message?.content || "Groq error.";
}

document.getElementById("runBtn").onclick = runAnalyst;
</script>

</body>
</html>
