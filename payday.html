<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Payday</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  body { margin:0; font-family:Arial, sans-serif; background:#f5f5f5; color:#111; }
  header { background:#1d2228; color:white; padding:16px 24px; font-size:22px; font-weight:bold; border-bottom:2px solid #0f8bff; }
  .container { max-width:1100px; margin:30px auto; background:white; padding:25px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.15); }
  h2 { margin-top:0; font-size:18px; font-weight:bold; color:#333; }
  textarea { width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-family:Consolas, monospace; font-size:13px; background:#fafafa; resize:vertical; }
  #aiOutput { height:260px; }
  input { width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-size:14px; margin-bottom:10px; }
  button { margin-top:10px; padding:10px 16px; background:#0f8bff; border:none; border-radius:6px; color:white; font-weight:bold; cursor:pointer; font-size:14px; }
</style>
</head>

<body>
<header>Payday</header>

<div class="container">

  <h2>Suggest a ticker (optional)</h2>
  <input id="suggestBox" placeholder="Example: AMD" />

  <button id="runBtn">Run Analyst</button>

  <h2>Payday Analyst Output</h2>
  <textarea id="aiOutput" readonly></textarea>

</div>

<script>
const FMP_KEY = "9JdfXFF1la9PBjBSJMWR7MfPDXwLfHTS";
const GROQ_KEY = "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";

// S&P100
const SYMBOLS = [
  "AAPL","MSFT","GOOGL","AMZN","NVDA","META","TSLA","BRK.B","JPM","V",
  "JNJ","WMT","PG","MA","HD","XOM","COST","AVGO","LLY","UNH",
  "PEP","KO","ABBV","ADBE","CRM","CSCO","ACN","TXN","CMCSA","NKE",
  "MRK","MCD","AMD","INTC","AMGN","IBM","ORCL","QCOM","UPS","CVX"
];

function fmt(n){ return (n===null||n===undefined||isNaN(n))?"-":Number(n).toFixed(2); }

async function fetchLatest(sym){
  const url = `https://financialmodelingprep.com/stable/historical-price-eod/full?symbol=${sym}&apikey=${FMP_KEY}`;
  const r = await fetch(url);
  const j = await r.json();
  if(!j || !j.historical || !j.historical.length) return null;
  return j.historical[0];
}

async function buildFeed(){
  let feed = "";
  for(const sym of SYMBOLS){
    try{
      const h = await fetchLatest(sym);
      if(!h) continue;
      feed += `${sym} close:${fmt(h.close)} change:${fmt(h.change)} pct:${fmt(h.changePercent)} vol:${h.volume}\n`;
    }catch(e){}
  }
  return feed;
}

async function runAnalyst(){
  const out = document.getElementById("aiOutput");
  const suggest = document.getElementById("suggestBox").value.trim();

  out.value = "Loading market data...";

  const feed = await buildFeed();

  const finalPrompt = `MARKET ANALYST PROMPT
---------------------

You are a professional Wall Street market analyst.

INPUTS:
Market Feed:
${feed}

User Focus Ticker:
${suggest || "None"}

OBJECTIVE:
Analyze the market feed and produce a concise but highly insightful market briefing.

REQUIRED ANALYSIS:

1. Market Leaders
- Identify stocks, ETFs, or sectors showing the strongest bullish momentum
- Explain WHY they are moving
- Mention catalysts, technical breakouts, news, earnings, guidance, analyst upgrades, macro events, etc.

2. Biggest Losers
- Identify the weakest performers
- Explain likely reasons for the decline
- Highlight panic selling, downgrades, earnings misses, dilution, sector weakness, or macro pressure

3. Unusual Activity
- Detect unusual volume, volatility spikes, options flow, or abnormal trading behavior
- Flag potential institutional activity or speculative momentum

4. Sector Rotation & Trends
- Identify which sectors are leading and lagging
- Explain broader market themes:
  - risk-on vs risk-off
  - AI momentum
  - rates/inflation impact
  - energy movement
  - crypto correlation
  - small caps vs mega caps
  - defensive rotation
  - semiconductor strength/weakness
  - consumer sentiment implications

5. Technical Perspective
For notable tickers:
- trend direction
- support/resistance
- breakout/breakdown levels
- relative strength
- momentum quality
- overextended vs undervalued conditions

6. Market Sentiment
Describe overall market tone:
- bullish, bearish, cautious, euphoric, defensive, mixed, etc.
- Mention VIX behavior, breadth, liquidity, and trader positioning if relevant

7. Notable Events
Highlight:
- earnings reactions
- Fed commentary
- economic data
- geopolitical events
- M&A activity
- regulatory developments
- analyst upgrades/downgrades

8. Deep Dive (ONLY if User Focus Ticker exists)
If a focus ticker is provided:
- perform a detailed analysis of that ticker
- include:
  - price action
  - catalysts
  - technical setup
  - volume profile
  - sentiment
  - risk factors
  - bullish and bearish scenarios
  - short-term and long-term outlook
  - key levels to watch

OUTPUT FORMAT:

# MARKET SNAPSHOT
(brief overview)

# TOP GAINERS & MOMENTUM
(bullet analysis)

# BIGGEST LOSERS
(bullet analysis)

# UNUSUAL ACTIVITY
(bullet analysis)

# SECTOR TRENDS
(bullet analysis)

# MARKET SENTIMENT
(summary)

# NOTABLE EVENTS
(summary)

# FOCUS TICKER ANALYSIS
(only if provided)

STYLE REQUIREMENTS:
- Write like a Bloomberg / institutional research analyst
- Be concise, data-driven, and insightful
- Avoid generic statements
- Prioritize actionable insights
- Explain WHY moves are happening
- Separate facts from speculation
- Use professional financial terminology
- If data is missing, state assumptions clearly`;

  out.value = "Sending to Groq...";

  const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + GROQ_KEY
    },
    body:JSON.stringify({
      model:"llama-3.1-70b-versatile",
      messages:[
        {role:"system", content:"You are Payday, a financial analyst."},
        {role:"user", content:finalPrompt}
      ]
    })
  });

  const j = await r.json();
  out.value = j.choices?.[0]?.message?.content || "Error.";
}

document.getElementById("runBtn").onclick = runAnalyst;
</script>

</body>
</html>
